apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: redis-databases
  namespace: openshift-gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/alan-teodoro/openshift-argocd.git
      revision: main
      directories:
      - path: databases/*
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/alan-teodoro/openshift-argocd.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: redis-enterprise
      syncPolicy:
        automated:
          prune: true
          selfHeal: true