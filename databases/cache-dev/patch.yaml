apiVersion: app.redislabs.com/v1alpha1
kind: RedisEnterpriseDatabase
metadata:
  name: cache-dev
  namespace: redis-dev
  labels:
    team: dev-team
    environment: dev
    database-type: cache
spec:
  redisEnterpriseCluster:
    name: demo-redis-cluster
  # Cache settings - temporary data with eviction
  memorySize: 1GB
  type: redis
  evictionPolicy: allkeys-lru
  persistence: disabled