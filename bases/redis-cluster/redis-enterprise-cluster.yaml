# Source: redis-enterprise-cluster/templates/servicemonitor.yaml
# ServiceMonitor for Prometheus to scrape Redis Enterprise metrics
# Metrics endpoint: https://<pod>:8070/v2 (HTTPS with self-signed cert)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-redis-cluster-metrics
  namespace: redis-enterprise
  labels:
    cluster: demo
    team: platform-team
    component: metrics
    app.kubernetes.io/managed-by: "argocd"
    cluster: "demo"
    gitops: "argocd"
  annotations:
    description: Shared Redis Enterprise Cluster - Demo multi-tenant setup
spec:
  # Select the Redis Enterprise pods
  selector:
    matchLabels:
      app: redis-enterprise
      redis.io/cluster: demo-redis-cluster

  # Namespace where the pods are located
  namespaceSelector:
    matchNames:
      - redis-enterprise

  # Endpoint configuration
  endpoints:
    - port: metrics
      path: /v2
      interval: 30s
      scrapeTimeout: 10s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      
      # Relabeling to add cluster information
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - targetLabel: cluster
          replacement: demo
        - targetLabel: team
          replacement: platform-team
