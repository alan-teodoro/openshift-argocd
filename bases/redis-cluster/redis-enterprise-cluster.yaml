# Source: redis-enterprise-cluster/templates/rec.yaml
apiVersion: app.redislabs.com/v1
kind: RedisEnterpriseCluster
metadata:
  name: demo-redis-cluster
  namespace: redis-enterprise
  labels:
    cluster: demo
    team: platform-team
    datacenter: dc1
    app.kubernetes.io/managed-by: "argocd"
    cluster: "demo"
    gitops: "argocd"
  annotations:
    # Prevent accidental deletion by ArgoCD
    argocd.argoproj.io/sync-options: "Prune=false"
    description: Shared Redis Enterprise Cluster - Demo multi-tenant setup
spec:
  nodes: 3
  certificates:
    proxyCertificateSecretName: "proxy-cert-secret"
    apiCertificateSecretName: "api-cert-secret"
    cmCertificateSecretName: "cm-cert-secret"
    syncerCertificateSecretName: "syncer-cert-secret"
    metricsExporterCertificateSecretName: "metrics-exporter-cert-secret"
  
  redisEnterpriseNodeResources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  # Persistent storage configuration
  persistentSpec:
    enabled: true
    storageClassName: ocs-external-storagecluster-ceph-rbd
    volumeSize: 50Gi
  
  redisEnterpriseImageSpec:
    imagePullPolicy: IfNotPresent
    versionTag: "8.0.10-81"
  servicesRiggerSpec:
    databaseServiceType: "cluster_ip"
    serviceNaming: "bdb_name"
  # Pod anti-affinity rules for high availability
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - podAffinityTerm:
        labelSelector:
          matchLabels:
            app: redis-enterprise
        topologyKey: kubernetes.io/hostname
      weight: 100
    - podAffinityTerm:
        labelSelector:
          matchLabels:
            app: redis-enterprise
        topologyKey: topology.kubernetes.io/zone
      weight: 50
  # Grafana Alloy sidecar for internal logs collection
  sideContainersSpec:
    - name: alloy
      image: grafana/alloy:latest
      args:
        - run
        - --server.http.listen-addr=0.0.0.0:12345
        - --storage.path=/tmp/alloy
        - /etc/alloy/config.alloy
      env:
        - name: CLUSTER_NAME
          value: "demo-redis-cluster"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: redis-enterprise-storage
          mountPath: /var/opt/redislabs/log
          subPath: logs
          readOnly: true
        - name: alloy-config
          mountPath: /etc/alloy
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

  # Additional volumes for sidecar containers
  volumes:
    - name: alloy-config
      configMap:
        name: alloy-sidecar-config
